name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Skip the bot's own release commit to prevent a loop. GITHUB_TOKEN-authored
    # commits already do not retrigger workflows, but the `[skip ci]` marker and
    # the actor guard provide defence-in-depth (e.g. if a PAT is later wired in).
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.semrel.outputs.new_release_published }}
      version: ${{ steps.semrel.outputs.new_release_version }}
      tag: ${{ steps.semrel.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          # When branch protection blocks the built-in token, override with a
          # repo-scoped PAT or GitHub App token stored as RELEASE_TOKEN.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify
        run: |
          npm run lint
          npm run build
      - name: Semantic Release
        id: semrel
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          npx semantic-release

  deploy:
    # Inline the Pages deploy here instead of listening for `release: published`
    # in a separate workflow — release events authored by GITHUB_TOKEN do not
    # cascade to other workflows, so a standalone deploy workflow never fires.
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the freshly tagged commit so the deployed bundle matches
          # the published GitHub release exactly.
          ref: ${{ needs.release.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Build the timetable for today's service day from the real Swiss GTFS
      # feed (holiday-aware). Falls back to the bundled sample if the feed is
      # unavailable, so a deploy never breaks.
      - name: Build transit data
        env:
          GTFS_URL: ${{ secrets.GTFS_URL }}
          DAYS: ${{ vars.PLANNING_DAYS || '14' }}
        run: |
          DATE="$(TZ=Europe/Zurich date +%F)"
          echo "Service day: $DATE"
          if npm run data:real -- "$DATE"; then
            echo "Built from the real Swiss GTFS feed."
          else
            echo "::warning::Real feed unavailable — falling back to sample data."
            npm run data
          fi
      # Build under the repository sub-path (https://<user>.github.io/<repo>/).
      - name: Build
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
