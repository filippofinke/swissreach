<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#eb0000" />

    <!-- Primary meta -->
    <title>SwissReach — Swiss public-transport reachability maps</title>
    <meta
      name="description"
      content="Open-source isochrone maps of Swiss public transport. See how far you can travel by train, bus and boat in a given time. Styled after the SBB Mobile app, running entirely in your browser."
    />
    <meta
      name="keywords"
      content="isochrone, Switzerland, public transport, SBB, reachability map, travel time, train, bus, RAPTOR, GTFS, MapLibre"
    />
    <meta name="author" content="Filippo Finke" />
    <meta name="robots" content="index, follow" />
    <meta name="color-scheme" content="light" />
    <link rel="canonical" href="https://filippofinke.github.io/swissreach/" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SwissReach" />
    <meta property="og:title" content="SwissReach — Swiss public-transport reachability maps" />
    <meta
      property="og:description"
      content="See how far you can travel by train, bus and boat from any Swiss station in a given time. Open-source isochrone maps, styled after SBB Mobile."
    />
    <meta property="og:url" content="https://filippofinke.github.io/swissreach/" />
    <meta property="og:image" content="https://filippofinke.github.io/swissreach/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SwissReach — reachability maps for Swiss public transport" />
    <meta property="og:locale" content="en" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SwissReach — Swiss public-transport reachability maps" />
    <meta
      name="twitter:description"
      content="See how far you can travel by train, bus and boat from any Swiss station in a given time. Open-source, runs in your browser."
    />
    <meta name="twitter:image" content="https://filippofinke.github.io/swissreach/og-image.png" />
    <meta name="twitter:image:alt" content="SwissReach — reachability maps for Swiss public transport" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "SwissReach",
        "description": "Open-source isochrone maps of Swiss public transport. See how far you can travel by train, bus and boat in a given time.",
        "url": "https://filippofinke.github.io/swissreach/",
        "applicationCategory": "TravelApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires a modern web browser with JavaScript and WebGL.",
        "image": "https://filippofinke.github.io/swissreach/og-image.png",
        "inLanguage": ["en", "de", "fr", "it", "rm"],
        "isAccessibleForFree": true,
        "license": "https://opensource.org/licenses/MIT",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "CHF" },
        "author": {
          "@type": "Person",
          "name": "Filippo Finke",
          "url": "https://github.com/filippofinke"
        }
      }
    </script>
  </head>
  <body class="sbb-light">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
